  <style>

      cursor: pointer;
    }

    svg {
      display: block;
      margin: 0 auto;
    }

    .legend {
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label for="dropdown"><strong>Factor:</strong></label>
    <select id="dropdown">

      <option value="Motivation_Level">Motivation</option>
      <option value="Family_Income">Family Income</option>

  <svg></svg>
